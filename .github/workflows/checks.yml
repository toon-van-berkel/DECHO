name: Pull Request Checks

on:
  pull_request:
    branches:
      - development
  push:
    branches:
      - development

jobs:
  build:
    name: Install and Build Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
